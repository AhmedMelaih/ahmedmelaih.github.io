<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>

  <!-- Mobile header -->
  <header class="mobile-header">
    <button id="menu-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
    <span class="mobile-name">Ahmed Melaih</span>
    <a href="{{ '/assets/Ahmed Melaih Data Scientist Resume FO.pdf' | relative_url }}" target="_blank" rel="noopener" class="mobile-resume">Resume</a>
  </header>

  <!-- Overlay for mobile menu -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <div class="profile">
          <div class="avatar-wrapper">
            <img src="{{ '/docs/assets/me_official.png' | relative_url }}" alt="Ahmed Melaih" class="avatar" onerror="this.style.display='none'">
          </div>
          <h1 class="name">Ahmed Melaih</h1>
          <p class="role">Data Scientist &amp; Senior System Analyst</p>
          <p class="tagline">Turning messy data into deployable models that forecast outcomes and drive decisions.</p>
        </div>

        <nav class="site-nav" aria-label="Page sections">
          <ul>
            <li><a href="#about"      class="nav-link"><span class="nav-line"></span><span>About</span></a></li>
            <li><a href="#skills"     class="nav-link"><span class="nav-line"></span><span>Skills</span></a></li>
            <li><a href="#projects"   class="nav-link"><span class="nav-line"></span><span>Projects</span></a></li>
            <li><a href="#experience" class="nav-link"><span class="nav-line"></span><span>Experience</span></a></li>
            <li><a href="#education"  class="nav-link"><span class="nav-line"></span><span>Education</span></a></li>
          </ul>
        </nav>

        <div class="social-links">
          <a href="https://github.com/AhmedMelaih" target="_blank" rel="noopener" aria-label="GitHub"><i class="fab fa-github"></i></a>
          <a href="https://linkedin.com/in/ahmedmelaih" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
          <a href="mailto:ahmedemlaih@gmail.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
          <a href="{{ '/assets/Ahmed Melaih Data Scientist Resume FO.pdf' | relative_url }}" target="_blank" rel="noopener" aria-label="Resume PDF"><i class="fas fa-file-pdf"></i></a>
        </div>

      </div>
    </aside>

    <!-- ── Main content ── -->
    <main class="main-content">
      {{ content }}
    </main>

  </div><!-- .layout -->

  <script>
  (function () {
    // ── Active nav on scroll ──
    const sections = document.querySelectorAll('section[id]');
    const navLinks = document.querySelectorAll('.nav-link');

    const sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(l => l.classList.remove('active'));
          const active = document.querySelector('.nav-link[href="#' + entry.target.id + '"]');
          if (active) active.classList.add('active');
        }
      });
    }, { rootMargin: '-30% 0px -60% 0px' });

    sections.forEach(s => sectionObserver.observe(s));

    // ── Smooth scroll ──
    navLinks.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const target = document.querySelector(link.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          // Close mobile menu
          document.getElementById('sidebar').classList.remove('open');
          document.getElementById('sidebar-overlay').classList.remove('visible');
        }
      });
    });

    // ── Reveal animations ──
    const reveals = document.querySelectorAll('.reveal');
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08 });
    reveals.forEach(el => revealObserver.observe(el));

    // ── Mobile menu ──
    const toggle   = document.getElementById('menu-toggle');
    const sidebar  = document.getElementById('sidebar');
    const overlay  = document.getElementById('sidebar-overlay');

    function openMenu()  { sidebar.classList.add('open');  overlay.classList.add('visible'); }
    function closeMenu() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); }

    toggle.addEventListener('click', () => sidebar.classList.contains('open') ? closeMenu() : openMenu());
    overlay.addEventListener('click', closeMenu);
  })();
  </script>
</body>
</html>
